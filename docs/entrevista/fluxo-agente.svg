<text class="th" x="250" y="74" text-anchor="middle">Streamlit</text>
<text class="ts" x="250" y="91" text-anchor="middle">app.py</text>

<rect class="box-blue" x="350" y="50" width="110" height="56" rx="8"/>
<text class="th" x="405" y="74" text-anchor="middle">Agente Agno</text>
<text class="ts" x="405" y="91" text-anchor="middle">agente.py</text>

